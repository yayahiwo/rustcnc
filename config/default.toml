# RustCNC Default Configuration

[server]
host = "0.0.0.0"
port = 8888
ws_tick_rate_hz = 100
ws_idle_tick_rate_hz = 5
# Allowed browser Origins for unsafe API calls (POST/DELETE) and `/ws` (dev tooling, proxies).
# Leave empty for strict same-origin.
# allowed_origins = ["http://localhost:5173"]

[serial]
baud_rate = 115200
status_poll_rate_hz = 5

[streamer]
rx_buffer_size = 128
response_timeout_ms = 5000
# CPU core to pin streamer thread to (optional, Pi 4 recommended: 3)
# cpu_pin_core = 3

[logging]
level = "info"
console_output = true

[files]
upload_dir = "./gcode_files"
max_file_size_mb = 100

# [auth]
# Enable username/password login for the Web UI.
# enabled = true
# username = "admin"
# Generate a password hash on the Pi:
#   printf '%s' 'PASSWORD' | /opt/rustcnc/rustcnc --hash-password-stdin
# password_hash = "sha256-iter:v1:..."
# session_ttl_secs = 86400
