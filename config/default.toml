# RustCNC Default Configuration

[server]
host = "0.0.0.0"
port = 8888
ws_tick_rate_hz = 100
ws_idle_tick_rate_hz = 5

[serial]
baud_rate = 115200
status_poll_rate_hz = 5

[streamer]
rx_buffer_size = 128
response_timeout_ms = 5000
# CPU core to pin streamer thread to (optional, Pi 4 recommended: 3)
# cpu_pin_core = 3

[logging]
level = "info"
console_output = true

[simulator]
enabled = false
motion_speed_factor = 10.0
startup_delay_ms = 100

[files]
upload_dir = "./gcode_files"
max_file_size_mb = 100
