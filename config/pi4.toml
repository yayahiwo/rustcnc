# RustCNC Raspberry Pi 4 Production Configuration
#
# Prerequisites:
#   1. Add isolcpus=3 to /boot/cmdline.txt (isolate core 3 for streamer)
#   2. Mount /var/log as tmpfs to reduce SD card writes
#   3. Mount rootfs with noatime
#   4. Grant CAP_SYS_NICE: sudo setcap cap_sys_nice+ep ./rustcnc
#      OR run as root

[server]
host = "0.0.0.0"
port = 8080
ws_tick_rate_hz = 100
ws_idle_tick_rate_hz = 5

[serial]
baud_rate = 115200
status_poll_rate_hz = 10

[streamer]
rx_buffer_size = 128
cpu_pin_core = 3
rt_priority = 80
response_timeout_ms = 5000

[logging]
level = "info"
log_dir = "/var/log/rustcnc"
console_output = false

[simulator]
enabled = false
motion_speed_factor = 10.0
startup_delay_ms = 100

[files]
upload_dir = "/home/pi/gcode_files"
max_file_size_mb = 200
